<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sessionStorage</title>
</head>
<body>
    <script>
        /*
            sessionStorag
            - 브라우저가 제공하는 웹 스토리지 중 하나로, 탭(세션) 단위로 데이터를 임시 저장하는 저장소
            - 페이지를 새로고침해도 데이터는 유지되지만, 브라우저 탭이나 창을 다는 순간 자동으로 삭제되는 것이 특징이며, 같은 사이트라도 다른 탭과 데이터가 공유되지 않음
            - 저장 용량은 약 5MB
            - 문자열만 저장 가능
            - 보안이 필요한 민감 정보는 저장하지 않은 것이 원칙

            데이터 저장
            sessionStorage.setItem("key", "value")
            const value = sessionStorage.getItem("key")
            데이터 삭제/ 모든 데이터 삭제
            sessionStoraga.removeItem("key")
            sessionStorage.clear()
        */
    </script>
    

    <h2>이 탭에서 방문한 횟수: <span id="counter">0</span>회</h2>
    <script>
        let count = sessionStorage.getItem("visitCount")
        count = count ? Number(count) + 1 : 1

        sessionStorage.setItem("visitCount", count)
        document.getElementById("counter").innerText = count

    </script>
</body>
</html>
